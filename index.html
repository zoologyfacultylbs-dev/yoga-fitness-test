<style>

<script>

const TEACHER_PASSWORD = "yoga2025";
const TIME_PER_Q = 20;

const ALL_QUESTIONS = [
  {id:1,answer:true,topic:"Philosophy",en:"The word 'Yoga' is derived from the Sanskrit root 'Yuj', meaning to unite or yoke.",hi:"'योग' शब्द संस्कृत मूल 'युज' से लिया गया है, जिसका अर्थ है जोड़ना या एकजुट करना।"},

  {id:6,answer:true,topic:"Asanas",en:"Surya Namaskar (Sun Salutation) consists of 12 steps performed in a sequence.",hi:"सूर्य नमस्कार एक क्रम में की जाने वाली 12 चरणों से बना है।"},
  {id:7,answer:true,topic:"Pranayama",en:"Nadi Shodhana Pranayama is also known as Alternate Nostril Breathing.",hi:"नाड़ी शोधन प्राणायाम को 'अनुलोम-विलोम' भी कहा जाता है।"},
  {id:8,answer:false,topic:"Fitness",en:"Aerobic exercises primarily build muscle strength rather than cardiovascular endurance.",hi:"एरोबिक व्यायाम मुख्य रूप से हृदय संबंधी सहनशक्ति की बजाय मांसपेशियों की ताकत बढ़ाते हैं।"},
  {id:9,answer:true,topic:"Fitness",en:"BMI is calculated by dividing weight (kg) by the square of height (metres).",hi:"BMI की गणना वजन (किग्रा) को ऊँचाई (मीटर) के वर्ग से विभाजित करके की जाती है।"},

  {id:11,answer:true,topic:"Anatomy",en:"The human spine has 33 vertebrae in total.",hi:"मानव रीढ़ की हड्डी में कुल 33 कशेरुकाएँ होती हैं।"},

  {id:20,answer:false,topic:"Fitness",en:"The resting heart rate of a well-trained athlete is typically higher than that of an untrained person.",hi:"एक अच्छे प्रशिक्षित खिलाड़ी की विश्राम हृदय गति सामान्यतः अप्रशिक्षित व्यक्ति से अधिक होती है।"},
];

// ── helpers ──────────────────────────────────────────────────
function shuffle(arr){const a=[...arr];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function genId(){return"YF-"+Math.random().toString(36).substr(2,6).toUpperCase();}
function grade(p){return p>=80?"A":p>=60?"B":p>=40?"C":"F";}
function gradeColor(g){return{A:"#4a7c59",B:"#2d6a9f",C:"#f5a623",F:"#e53935"}[g]||"#888";}
function fmtTime(ts){return new Date(ts).toLocaleString("en-IN",{dateStyle:"short",timeStyle:"short"});}
function isOpen(win){if(!win||!win.enabled)return true;const n=Date.now();return n>=win.startTs&&n<=win.endTs;}
function winStatus(win){if(!win||!win.enabled)return"open";const n=Date.now();if(n<win.startTs)return"before";if(n>win.endTs)return"after";return"open";}

// ── API calls ─────────────────────────────────────────────────
const CONFIGURED = GOOGLE_SCRIPT_URL && !GOOGLE_SCRIPT_URL.startsWith("PASTE_");
async function apiGet(action){
  const r=await fetch(`${GOOGLE_SCRIPT_URL}?action=${action}`);
  return r.json();
}
async function apiPost(payload){
  const r=await fetch(GOOGLE_SCRIPT_URL,{method:"POST",headers:{"Content-Type":"text/plain"},body:JSON.stringify(payload)});
  return r.json();
}
async function loadSubs(){try{const r=await apiGet("getSubmissions");return r.ok?r.submissions:[];}catch{return[];}}
async function saveSub(rec){try{await apiPost({action:"submit",record:rec});return true;}catch{return false;}}
async function loadWin(){try{const r=await apiGet("getWindow");return r.ok?r.window:null;}catch{return null;}}
async function saveWin(w){try{await apiPost({action:"saveWindow",window:w});return true;}catch{return false;}}

// ── state ─────────────────────────────────────────────────────
let STATE = {
  mode:"home",          // home | test | teacher
  testPhase:"checking", // checking | closed | register | instructions | test | done
  teacherTab:"results", // results | schedule
  name:"",roll:"",className:"",mobile:"",
  sessionId:genId(),
  questions:[],current:0,answers:[],
  timeLeft:TIME_PER_Q,warnings:0,flagged:false,
  saving:false,saved:false,
  authed:false,pw:"",pwErr:false,
  subs:[],subsLoading:false,
  expandedId:null,filter:"all",
  win:null,winEnabled:false,
  startDate:"",startTime:"",endDate:"",endTime:"",
  winSaving:false,winSaved:false,
  confirmClear:false,
};

let timerInterval=null;
let warnCount=0;

// ── render engine ─────────────────────────────────────────────
function el(tag,attrs,...children){
  const e=document.createElement(tag);
  if(attrs)Object.entries(attrs).forEach(([k,v])=>{
    if(k==="class")e.className=v;
    else if(k==="style"&&typeof v==="object")Object.assign(e.style,v);
    else if(k.startsWith("on"))e.addEventListener(k.slice(2).toLowerCase(),v);
    else e.setAttribute(k,v);
  });
  children.flat().forEach(c=>{
    if(c==null||c===false)return;
    e.appendChild(typeof c==="string"?document.createTextNode(c):c);
  });
  return e;
}
function render(){
  const root=document.getElementById("root");
  // Track focused element before wipe so we can restore after re-render
  const focused=document.activeElement;
  const focusedId=focused&&focused.dataset?focused.dataset.fid:null;
  const focusedType=focused?focused.type:null;
  const caretPos=focused&&focused.selectionStart!=null?focused.selectionStart:null;
  root.innerHTML="";
  root.appendChild(buildView());
  // Restore focus to the same field after re-render
  if(focusedId){
    const el2=root.querySelector(`[data-fid="${focusedId}"]`);
    if(el2){el2.focus();if(caretPos!=null&&el2.setSelectionRange)el2.setSelectionRange(caretPos,caretPos);}
  }
}
function setState(patch,rerender=true){
  Object.assign(STATE,patch);
  if(rerender)render();
}

// ── VIEWS ─────────────────────────────────────────────────────

function buildView(){
  if(!CONFIGURED)return buildSetupWarn();
  if(STATE.mode==="home")return buildHome();
  if(STATE.mode==="test")return buildTest();
  if(STATE.mode==="teacher")return buildTeacher();
}

function buildSetupWarn(){
  return el("div",{class:"card"},
    el("div",{class:"band"},el("span",{class:"band-icon"},"⚠️"),
      el("div",null,el("div",{class:"band-title"},"Setup Required"),el("div",{class:"band-sub"},"Backend not connected"))),
    el("div",{class:"body"},
      el("div",{class:"setup-warn"},
        "Open ",el("code",null,"index.html")," in a text editor. Find ",
        el("code",null,"GOOGLE_SCRIPT_URL")," near the top of the script, and replace ",
        el("code",null,"PASTE_YOUR_APPS_SCRIPT_WEB_APP_URL_HERE")," with your deployed Google Apps Script URL. ",
        "Then re-upload the file to GitHub."
      )
    )
  );
}

function buildHome(){
  const status=winStatus(STATE.win);
  const noticeColor={open:"#e8f5e9",before:"#fff8e1",after:"#fde8e8"}[status];
  const noticeBorder={open:"#4a7c59",before:"#f5a623",after:"#e53935"}[status];
  const noticeText={open:"#2e7d32",before:"#7a4f00",after:"#b71c1c"}[status];
  const noticeMsg=STATE.win&&STATE.win.enabled ? (
    status==="open"?`✅ Test is OPEN until ${fmtTime(STATE.win.endTs)}`:
    status==="before"?`⏳ Test opens on ${fmtTime(STATE.win.startTs)}`:
    `🔒 Test window has closed (ended ${fmtTime(STATE.win.endTs)})`
  ):null;

  const testBg=status==="open"?"linear-gradient(135deg,#4a7c59,#2d5e40)":"linear-gradient(135deg,#aaa,#888)";

  return el("div",null,
    el("div",{class:"card"},
      el("div",{class:"home-band"},
        el("div",{style:{fontSize:"48px",marginBottom:"8px"}},"🕉️"),
        el("div",{class:"home-title"},"Yoga & Fitness"),
        el("div",{class:"home-sub"},"Vocational Course — Online Assessment Portal"),
        el("div",{class:"home-inst"},"श्री लाल बहादुर शास्त्री डिग्री कॉलेज, गोण्डा")
      ),
      el("div",{class:"home-body"},
        noticeMsg?el("div",{style:{padding:"10px 14px",borderRadius:"8px",fontSize:"13px",background:noticeColor,borderLeft:`4px solid ${noticeBorder}`,color:noticeText}},noticeMsg):"",
        el("button",{class:"big-btn",style:{background:testBg,cursor:status==="open"?"pointer":"not-allowed"},
          onClick:status==="open"?()=>goTest():null},
          el("span",{class:"big-btn-icon"},"📝"),

      ...[{v:subs.length,l:"Total",c:"#2D1B69"},{v:avg+"%",l:"Avg Score",c:"#2d6a9f"},{v:flagCount,l:"Flagged",c:"#e53935"},{v:gc.A||0,l:"Grade A",c:"#4a7c59"}]
        .map(s=>el("div",{class:"summary-box"},el("div",{class:"stat-val",style:{color:s.c}},String(s.v)),el("div",{class:"stat-lbl"},s.l)))

      );
    }),
    el("div",{class:"filter-row"},
      el("div",{class:"section-title"},"Submissions"),
      el("div",{class:"filter-btns"},
        el("button",{class:"filter-btn"+(STATE.filter==="all"?" active":""),onClick:()=>setState({filter:"all"})},"All ("+subs.length+")"),
        el("button",{class:"filter-btn"+(STATE.filter==="flagged"?" active":""),onClick:()=>setState({filter:"flagged"})},"🚨 Flagged ("+flagCount+")")

// ── helper renderers ──────────────────────────────────────────
function buildCard(icon,title,sub,content){
  return el("div",null,
    el("div",{class:"card"},
      el("div",{class:"band"},el("span",{class:"band-icon"},icon),
        el("div",null,el("div",{class:"band-title"},title),el("div",{class:"band-sub"},sub))),
      content
    )
  );
}
function lbl(text){return el("label",{class:"lbl"},text);}
function inp(type,val,onChange,extra={}){
  const e=document.createElement("input");
  e.type=type;
  e.value=val;
  if(extra.placeholder)e.placeholder=extra.placeholder;
  if(extra.maxLength)e.maxLength=extra.maxLength;
  // Apply any extra dataset or other attrs (e.g. data-fid for focus restore)
  Object.entries(extra).forEach(([k,v])=>{
    if(k.startsWith("data-"))e.setAttribute(k,v);
  });
  e.addEventListener("input",ev=>onChange(ev.target.value));
  return e;
}
function btn(text,onClick,disabled=false,style={}){
  const b=el("button",{class:"btn"},text);
  if(disabled)b.disabled=true;
  b.addEventListener("click",onClick);
  Object.assign(b.style,style);
  return b;
}

// ── actions ───────────────────────────────────────────────────
function goTest(){
  loadWin().then(win=>{
    const open=isOpen(win);
    setState({mode:"test",testPhase:open?"register":"closed",win,sessionId:genId(),name:"",roll:"",className:"",mobile:"",answers:[],questions:[],current:0,warnings:0,flagged:false,saving:false,saved:false});
    warnCount=0;
  });
}
function goTeacher(){
  setState({mode:"teacher",authed:false,pw:"",pwErr:false});
}
function doLogin(){
  if(STATE.pw===TEACHER_PASSWORD){
    setState({authed:true,pwErr:false,subsLoading:true});
    loadSubs().then(subs=>{
      loadWin().then(win=>{
        const ws=win||{enabled:false,startTs:0,endTs:0};
        const sd=ws.startTs?new Date(ws.startTs):{};
        const ed=ws.endTs?new Date(ws.endTs):{};
        setState({subs,subsLoading:false,win:ws,winEnabled:ws.enabled,
          startDate:ws.startTs?sd.toISOString().slice(0,10):"",
          startTime:ws.startTs?sd.toTimeString().slice(0,5):"",
          endDate:ws.endTs?ed.toISOString().slice(0,10):"",
          endTime:ws.endTs?ed.toTimeString().slice(0,5):"",
        });
      });
    });
  }else{
    setState({pwErr:true});
  }
}
function startTest(){
  clearInterval(timerInterval);
  warnCount=0;
  const qs=shuffle(ALL_QUESTIONS);
  setState({testPhase:"test",questions:qs,current:0,answers:[],timeLeft:TIME_PER_Q,warnings:0,flagged:false,saving:false,saved:false});
  attachTabListeners();
  startTimer();
}
function startTimer(){
  clearInterval(timerInterval);
  timerInterval=setInterval(()=>{
    const tl=STATE.timeLeft-1;
    if(tl<=0){clearInterval(timerInterval);advance(null);}
    else setState({timeLeft:tl});
  },1000);
}
function advance(val){
  clearInterval(timerInterval);
  const ans=[...STATE.answers];
  ans[STATE.current]=val;
  const next=STATE.current+1;
  if(next<STATE.questions.length){
    setState({answers:ans,current:next,timeLeft:TIME_PER_Q});
    startTimer();
  }else{
    removeTabListeners();
    setState({answers:ans,testPhase:"done",saving:true});
    submitResult(ans);
  }
}
function submitResult(ans){
  const qs=STATE.questions;
  const sc=qs.reduce((a,q,i)=>a+(ans[i]===q.answer?1:0),0);
  const pct=Math.round((sc/qs.length)*100);
  const rec={
    sessionId:STATE.sessionId,name:STATE.name,roll:STATE.roll,
    className:STATE.className,mobile:STATE.mobile,
    score:sc,total:qs.length,percentage:pct,grade:grade(pct),
    warnings:warnCount,flagged:warnCount>=3,timestamp:Date.now(),
    answers:qs.map((q,i)=>({qid:q.id,question:q.en,hindi:q.hi,topic:q.topic,correct:q.answer,given:ans[i]})),
  };
  saveSub(rec).then(()=>setState({saving:false,saved:true}));
}
function attachTabListeners(){
  document.addEventListener("visibilitychange",onVis);
  window.addEventListener("blur",onBlur);
}
function removeTabListeners(){
  document.removeEventListener("visibilitychange",onVis);
  window.removeEventListener("blur",onBlur);
}
function onVis(){if(document.hidden)bumpWarn();}
function onBlur(){bumpWarn();}
function bumpWarn(){
  warnCount++;
  setState({warnings:warnCount,flagged:warnCount>=3});
}
async function doClear(){
  await apiPost({action:"clearAll"});
  setState({subs:[],confirmClear:false});
}
async function doSaveWindow(){
  const st=new Date(`${STATE.startDate}T${STATE.startTime}`).getTime();
  const en=new Date(`${STATE.endDate}T${STATE.endTime}`).getTime();
  if(!STATE.winEnabled){
    setState({winSaving:true});
    await saveWin({enabled:false,startTs:0,endTs:0});
    setState({winSaving:false,winSaved:true,win:{enabled:false}});
    setTimeout(()=>setState({winSaved:false}),3000);
    return;
  }
  if(isNaN(st)||isNaN(en)||en<=st){alert("Please set valid start and end date/time. End must be after Start.");return;}
  setState({winSaving:true});
  const w={enabled:true,startTs:st,endTs:en};
  await saveWin(w);
  setState({winSaving:false,winSaved:true,win:w});
  setTimeout(()=>setState({winSaved:false}),3000);
}

// ── init ──────────────────────────────────────────────────────
loadWin().then(win=>setState({win}));
render();
</script>
