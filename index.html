function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}
function genSessionId() { return "YF-" + Math.random().toString(36).substr(2, 6).toUpperCase(); }
function grade(pct) { return pct >= 80 ? "A" : pct >= 60 ? "B" : pct >= 40 ? "C" : "F"; }
function gradeColor(g) { return { A: "#4a7c59", B: "#2d6a9f", C: "#f5a623", F: "#e53935" }[g] || "#888"; }
function formatTime(ts) { return new Date(ts).toLocaleString("en-IN", { dateStyle: "short", timeStyle: "short" }); }

function isTestOpen(win) {
  if (!win || !win.enabled) return true;
  const now = Date.now();
  return now >= win.startTs && now <= win.endTs;
}
function windowStatus(win) {
  if (!win || !win.enabled) return "open";
  const now = Date.now();
  if (now < win.startTs) return "before";
  if (now > win.endTs) return "after";
  return "open";
}

// ─── BACKEND CALLS (Google Apps Script) ───────────────────────────
async function apiGet(action, params = {}) {
  const qs = new URLSearchParams({ action, ...params }).toString();
  const res = await fetch(`${GOOGLE_SCRIPT_URL}?${qs}`);
  return res.json();
}
async function apiPost(action, payload) {
  const res = await fetch(GOOGLE_SCRIPT_URL, {
    method: "POST",
    headers: { "Content-Type": "text/plain" }, // avoids CORS preflight on Apps Script
    body: JSON.stringify({ action, ...payload }),
  });
  return res.json();
}
async function loadSubmissions() {
  try { const r = await apiGet("getSubmissions"); return r.ok ? r.submissions : []; }
  catch { return []; }
}
async function saveSubmission(record) {
  try { await apiPost("submit", { record }); return true; } catch { return false; }
}
async function loadWindow() {
  try { const r = await apiGet("getWindow"); return r.ok ? r.window : null; }
  catch { return null; }
}
async function saveWindow(win) {
  try { await apiPost("saveWindow", { window: win }); return true; } catch { return false; }
}

// ─── STUDENT TEST ─────────────────────────────────────────────────
function StudentTest({ onBack }) {
  const [phase, setPhase] = useState("checking");
  const [name, setName] = useState("");
  const [roll, setRoll] = useState("");
  const [className, setClassName] = useState("");
  const [mobile, setMobile] = useState("");
  const [sessionId] = useState(genSessionId);
  const [questions, setQuestions] = useState([]);
  const [current, setCurrent] = useState(0);
  const [answers, setAnswers] = useState([]);
  const [timeLeft, setTimeLeft] = useState(TIME_PER_Q);
  const [warnings, setWarnings] = useState(0);
  const [flagged, setFlagged] = useState(false);
  const [saving, setSaving] = useState(false);
  const [saved, setSaved] = useState(false);
  const timerRef = useRef(null);
  const qTimeRef = useRef(TIME_PER_Q);
  const warnRef = useRef(0);

  useEffect(() => {
    loadWindow().then(win => {
      if (isTestOpen(win)) setPhase("register");
      else setPhase("closed");
    });
  }, []);

  useEffect(() => {
    if (phase !== "test") return;
    const bump = () => {
      warnRef.current += 1;
      setWarnings(warnRef.current);
      if (warnRef.current >= 3) setFlagged(true);
    };
    const onVis = () => { if (document.hidden) bump(); };
    const onBlur = () => bump();
    document.addEventListener("visibilitychange", onVis);
    window.addEventListener("blur", onBlur);
    return () => {
      document.removeEventListener("visibilitychange", onVis);
      window.removeEventListener("blur", onBlur);
    };
  }, [phase]);

  useEffect(() => {
    if (phase !== "test") return;
    qTimeRef.current = TIME_PER_Q;
    setTimeLeft(TIME_PER_Q);
    clearInterval(timerRef.current);
    timerRef.current = setInterval(() => {
      qTimeRef.current -= 1;
      setTimeLeft(qTimeRef.current);
      if (qTimeRef.current <= 0) { clearInterval(timerRef.current); advance(null); }
    }, 1000);
    return () => clearInterval(timerRef.current);
  }, [current, phase]);

  const advance = useCallback((val) => {
    clearInterval(timerRef.current);
    setAnswers(prev => { const u = [...prev]; u[current] = val; return u; });
    setCurrent(c => {
      if (c + 1 < questions.length) return c + 1;
      setTimeout(() => setPhase("done"), 50);
      return c;
    });
  }, [current, questions.length]);

  const startTest = () => {
    setQuestions(shuffle(ALL_QUESTIONS));
    setAnswers([]);
    setCurrent(0);
    warnRef.current = 0;
    setWarnings(0);
    setFlagged(false);
    setPhase("test");
  };

  useEffect(() => {
    if (phase !== "done" || saved || saving) return;
    const sc = questions.reduce((a, q, i) => a + (answers[i] === q.answer ? 1 : 0), 0);
    const pct = Math.round((sc / questions.length) * 100);
    const record = {
      sessionId, name, roll, className, mobile, score: sc, total: questions.length,
      percentage: pct, grade: grade(pct),
      warnings: warnRef.current, flagged: warnRef.current >= 3,
      timestamp: Date.now(),
      answers: questions.map((q, i) => ({
        qid: q.id, question: q.en, hindi: q.hi, topic: q.topic,
        correct: q.answer, given: answers[i],
      })),
    };
    setSaving(true);
    saveSubmission(record).then(() => { setSaving(false); setSaved(true); });
  }, [phase]);

  if (phase === "checking") return (
    <div style={S.page}><div style={S.card}>
      <div style={S.band}><span style={S.bandIcon}>⏳</span>
        <div><div style={S.bandTitle}>Please wait...</div><div style={S.bandSub}>Checking exam availability</div></div>
      </div>
      <div style={{ padding: 40, textAlign: "center", color: "#888" }}>Loading...</div>
    </div></div>
  );

  if (phase === "closed") return (
    <div style={S.page}><div style={S.card}>
      <div style={S.band}><span style={S.bandIcon}>🔒</span>
        <div><div style={S.bandTitle}>Test Not Available</div><div style={S.bandSub}>परीक्षा उपलब्ध नहीं है</div></div>
      </div>
      <div style={S.body}>
        <div style={{ textAlign: "center", padding: "20px 0", fontSize: 48 }}>🔒</div>
        <p style={{ textAlign: "center", color: "#555", fontSize: 15, lineHeight: 1.6 }}>
          The test is not currently active.<br />
          <span style={{ color: "#888", fontSize: 13 }}>परीक्षा अभी सक्रिय नहीं है। कृपया निर्धारित समय पर पुनः प्रयास करें।</span>
        </p>
        <Btn onClick={onBack}>← Back to Home</Btn>
      </div>
    </div></div>
  );

  if (phase === "register") return (
    <div style={S.page}><div style={S.card}>
      <div style={S.band}><span style={S.bandIcon}>🕉️</span>
        <div><div style={S.bandTitle}>Yoga &amp; Fitness Test</div><div style={S.bandSub}>Student Registration / छात्र पंजीकरण</div></div>
      </div>
      <div style={S.body}>
        <Label>पूरा नाम / Full Name</Label>
        <input style={S.input} placeholder="e.g. Priya Sharma" value={name} onChange={e => setName(e.target.value)} />
        <Label>अनुक्रमांक / Roll Number</Label>
        <input style={S.input} placeholder="e.g. 2024YF031" value={roll} onChange={e => setRoll(e.target.value)} />
        <Label>कक्षा / Class</Label>
        <input style={S.input} placeholder="e.g. B.Sc. I Year" value={className} onChange={e => setClassName(e.target.value)} />
        <Label>मोबाइल नंबर / Mobile Number</Label>
        <input style={S.input} placeholder="e.g. 9876543210" type="tel" maxLength={10} value={mobile} onChange={e => setMobile(e.target.value.replace(/\D/g, ""))} />
        <div style={S.sessionPill}>Session ID: <b>{sessionId}</b> <span style={S.note}>(इसे नोट करें / note this)</span></div>
        <Btn disabled={!name.trim() || !roll.trim() || !className.trim() || mobile.length !== 10} onClick={() => setPhase("instructions")}>Proceed to Instructions →</Btn>
        <div style={S.backLink} onClick={onBack}>← Back to Home</div>
      </div>
    </div></div>
  );

  if (phase === "instructions") return (
    <div style={S.page}><div style={S.card}>
      <div style={S.band}><span style={S.bandIcon}>📋</span>
        <div><div style={S.bandTitle}>निर्देश / Instructions</div><div style={S.bandSub}>शुरू करने से पहले पढ़ें</div></div>
      </div>
      <div style={S.body}>
        {[
          ["20 सत्य/असत्य प्रश्न हैं।", "20 True / False questions."],
          [`प्रत्येक प्रश्न के लिए ${TIME_PER_Q} सेकंड हैं।`, `Each question has ${TIME_PER_Q} seconds.`],
          ["प्रश्न यादृच्छिक क्रम में आएंगे।", "Questions are randomized for every student."],
          ["एक बार उत्तर देने के बाद वापस नहीं जा सकते।", "You cannot go back to a previous question."],
          ["टैब बदलने पर उल्लंघन दर्ज होगा।", "Switching tabs is recorded as a violation."],
          ["3 उल्लंघन पर सत्र संदिग्ध चिह्नित होगा।", "3 violations will flag your submission."],
          ["किसी पुस्तक या अन्य उपकरण का उपयोग न करें।", "Do not use books, notes, or other devices."],
          ["परीक्षा समाप्त होने पर परिणाम स्वतः सुरक्षित हो जाएगा।", "Result is auto-saved after the last question."],
        ].map(([h, e], i) => (
          <div key={i} style={S.instrRow}>
            <div style={S.instrNum}>{i + 1}</div>
            <div>
              <div style={{ fontSize: 13, color: "#2D1B69", fontWeight: 600 }}>{h}</div>
              <div style={{ fontSize: 12, color: "#777" }}>{e}</div>
            </div>
          </div>
        ))}
        <div style={S.infoBox}>
          नाम / Name: <b>{name}</b> &nbsp;|&nbsp; अनुक्रमांक / Roll: <b>{roll}</b><br/>
          कक्षा / Class: <b>{className}</b> &nbsp;|&nbsp; Mobile: <b>{mobile}</b>
        </div>
        <Btn onClick={startTest}>▶ परीक्षा शुरू करें / Start Test Now</Btn>
      </div>
    </div></div>
  );

  if (phase === "test") {
    const q = questions[current] || {};
    const pct = (timeLeft / TIME_PER_Q) * 100;
    const tc = timeLeft <= 7 ? "#e53935" : timeLeft <= 14 ? "#f5a623" : "#4a7c59";
    return (
      <div style={S.page}><div style={S.card}>
        <div style={{ ...S.band, justifyContent: "space-between" }}>
          <div>
            <div style={S.bandTitle}>Yoga &amp; Fitness — Vocational</div>
            <div style={S.bandSub}>{name} | {roll}</div>
          </div>
          <div style={{ textAlign: "right" }}>
            <div style={{ fontSize: 30, fontWeight: 900, color: tc, lineHeight: 1 }}>{timeLeft}s</div>
            <div style={{ fontSize: 11, color: "#c0b0e8" }}>{current + 1} / {questions.length}</div>
          </div>
        </div>
        <div style={S.timerBg}><div style={{ ...S.timerFill, width: `${pct}%`, background: tc }} /></div>
        {warnings > 0 && (
          <div style={S.warnBar}>
            ⚠️ टैब परिवर्तन दर्ज ({warnings}/3){warnings >= 3 ? " — संदिग्ध चिह्नित!" : ""}
            &nbsp;|&nbsp; Tab-switch detected ({warnings}/3){warnings >= 3 ? " — flagged!" : ""}
          </div>
        )}
        <div style={S.topicTag}>{q.topic}</div>
        <div style={S.qBox}>
          <div style={S.qNum}>Q{current + 1}.</div>
          <div>
            <div style={S.qText}>{q.en}</div>
            <div style={S.qTextHi}>{q.hi}</div>
          </div>
        </div>
        <div style={S.btnRow}>
          <button style={{ ...S.ansBtn, background: "#4a7c59" }} onClick={() => advance(true)}>✔ सत्य / TRUE</button>
          <button style={{ ...S.ansBtn, background: "#e53935" }} onClick={() => advance(false)}>✘ असत्य / FALSE</button>
        </div>
        <div style={S.dots}>
          {questions.map((_, i) => (
            <div key={i} style={{ ...S.dot, background: i < current ? "#4a7c59" : i === current ? "#f5a623" : "#e0d8f0" }} />
          ))}
        </div>
      </div></div>
    );
  }

  if (phase === "done") return (
    <div style={S.page}><div style={S.card}>
      <div style={S.band}>
        <span style={S.bandIcon}>✅</span>
        <div><div style={S.bandTitle}>परीक्षा समाप्त / Test Submitted</div>
          <div style={S.bandSub}>{name} | {roll} | {sessionId}</div>
        </div>
      </div>
      <div style={S.body}>
        <div style={{ textAlign: "center", padding: "28px 0 16px" }}>
          <div style={{ fontSize: 64 }}>{saving ? "⏳" : "🎉"}</div>
          <div style={{ fontSize: 20, fontWeight: 800, color: "#2D1B69", marginTop: 12 }}>
            {saving ? "सुरक्षित हो रहा है..." : "परीक्षा सफलतापूर्वक जमा हो गई!"}
          </div>
          <div style={{ fontSize: 14, color: "#777", marginTop: 6 }}>
            {saving ? "Saving your response..." : "Test submitted successfully!"}
          </div>
        </div>
        {saved && (
          <div style={S.savedBar}>
            ✅ आपका उत्तर रिकॉर्ड कर लिया गया है। परिणाम शिक्षक द्वारा घोषित किया जाएगा।<br />
            <span style={{ fontSize: 12 }}>Your response has been recorded. Results will be declared by the teacher.</span>
          </div>
        )}
        <div style={{ ...S.sessionPill, marginTop: 16 }}>
          Session ID: <b>{sessionId}</b>
          <span style={S.note}> — इसे भविष्य के लिए नोट करें / keep this for reference</span>
        </div>
        <Btn onClick={onBack} style={{ marginTop: 20 }}>← Home पर वापस जाएं</Btn>
      </div>
    </div></div>
  );

  return null;
}

// ─── TEACHER DASHBOARD ────────────────────────────────────────────
function TeacherDashboard({ onBack }) {
  const [authed, setAuthed] = useState(false);
  const [pw, setPw] = useState("");
  const [pwErr, setPwErr] = useState(false);
  const [subs, setSubs] = useState([]);
  const [loading, setLoading] = useState(false);
  const [expanded, setExpanded] = useState(null);
  const [filter, setFilter] = useState("all");
  const [activeTab, setActiveTab] = useState("results");
  const [win, setWin] = useState(null);
  const [winEnabled, setWinEnabled] = useState(false);
  const [startDate, setStartDate] = useState("");
  const [startTime, setStartTime] = useState("");
  const [endDate, setEndDate] = useState("");
  const [endTime, setEndTime] = useState("");
  const [winSaving, setWinSaving] = useState(false);
  const [winSaved, setWinSaved] = useState(false);

  const login = () => {
    if (pw === TEACHER_PASSWORD) { setAuthed(true); setPwErr(false); }
    else setPwErr(true);
  };

  useEffect(() => {
    if (!authed) return;
    setLoading(true);
    loadSubmissions().then(d => { setSubs(d); setLoading(false); });
    loadWindow().then(w => {
      if (w) {
        setWin(w);
        setWinEnabled(w.enabled);
        if (w.startTs) {
          const sd = new Date(w.startTs);
          setStartDate(sd.toISOString().slice(0, 10));
          setStartTime(sd.toTimeString().slice(0, 5));
        }
        if (w.endTs) {
          const ed = new Date(w.endTs);
          setEndDate(ed.toISOString().slice(0, 10));
          setEndTime(ed.toTimeString().slice(0, 5));
        }
      }
    });
  }, [authed]);

  const handleSaveWindow = async () => {
    const startTs = new Date(`${startDate}T${startTime}`).getTime();
    const endTs = new Date(`${endDate}T${endTime}`).getTime();
    if (isNaN(startTs) || isNaN(endTs) || endTs <= startTs) {
      alert("Please set valid start and end date/time. End must be after Start.");
      return;
    }
    const newWin = { enabled: winEnabled, startTs, endTs };
    setWinSaving(true);
    await saveWindow(newWin);
    setWin(newWin);
    setWinSaving(false);
    setWinSaved(true);
    setTimeout(() => setWinSaved(false), 3000);
  };

  if (!authed) return (
    <div style={S.page}><div style={S.card}>
      <div style={S.band}><span style={S.bandIcon}>🔒</span>
        <div><div style={S.bandTitle}>Teacher Dashboard</div><div style={S.bandSub}>Authorized access only</div></div>
      </div>
      <div style={S.body}>
        <Label>Password</Label>
        <input style={{ ...S.input, borderColor: pwErr ? "#e53935" : "#d0c8f0" }}
          type="password" placeholder="Enter teacher password"
          value={pw}
          onChange={e => { setPw(e.target.value); setPwErr(false); }}
          onKeyDown={e => e.key === "Enter" && login()}
        />
        {pwErr && <div style={{ color: "#e53935", fontSize: 13, marginTop: 6 }}>Incorrect password.</div>}
        <Btn onClick={login}>Unlock Dashboard →</Btn>
        <div style={S.backLink} onClick={onBack}>← Back to Home</div>
      </div>
    </div></div>
  );

  const filtered = filter === "flagged" ? subs.filter(s => s.flagged) : subs;
  const avg = subs.length ? Math.round(subs.reduce((a, s) => a + s.percentage, 0) / subs.length) : 0;
  const flagCount = subs.filter(s => s.flagged).length;
  const gradeCount = { A: 0, B: 0, C: 0, F: 0 };
  subs.forEach(s => { gradeCount[s.grade] = (gradeCount[s.grade] || 0) + 1; });
  const currentStatus = windowStatus(win);

  return (
    <div style={S.page}><div style={S.card}>
      <div style={S.band}>
        <span style={S.bandIcon}>📊</span>
        <div><div style={S.bandTitle}>Teacher Dashboard</div>
          <div style={S.bandSub}>Yoga &amp; Fitness — Vocational Course</div>
        </div>
      </div>

      <div style={S.tabStrip}>
        <TabBtn active={activeTab === "results"} onClick={() => setActiveTab("results")}>📋 Results</TabBtn>
        <TabBtn active={activeTab === "schedule"} onClick={() => setActiveTab("schedule")}>🕐 Exam Window</TabBtn>
      </div>

      <div style={S.body}>
        {activeTab === "results" && (
          loading ? (
            <div style={{ textAlign: "center", padding: 40, color: "#888" }}>Loading submissions...</div>
          ) : subs.length === 0 ? (
            <div style={S.emptyBox}>
              <div style={{ fontSize: 40, marginBottom: 10 }}>📭</div>
              <div style={{ color: "#888", fontSize: 15 }}>No submissions yet. Students' results will appear here after they complete the test.</div>
            </div>
          ) : (
            <>
              <div style={S.summaryRow}>
                {[
                  { v: subs.length, l: "Total", c: "#2D1B69" },
                  { v: `${avg}%`, l: "Avg Score", c: "#2d6a9f" },
                  { v: flagCount, l: "Flagged", c: "#e53935" },
                  { v: gradeCount.A || 0, l: "Grade A", c: "#4a7c59" },
                ].map(s => (
                  <div key={s.l} style={S.summaryBox}>
                    <div style={{ fontWeight: 900, fontSize: 26, color: s.c }}>{s.v}</div>
                    <div style={S.statLbl}>{s.l}</div>
                  </div>
                ))}
              </div>

              <SectionTitle>Grade Distribution</SectionTitle>
              {["A", "B", "C", "F"].map(g => {
                const cnt = gradeCount[g] || 0;
                const w = subs.length ? Math.round((cnt / subs.length) * 100) : 0;
                return (
                  <div key={g} style={S.gradeBarRow}>
                    <div style={{ width: 22, fontWeight: 700, color: gradeColor(g), fontSize: 14 }}>{g}</div>
                    <div style={S.topicBarBg}><div style={{ ...S.topicBarFill, width: `${w}%`, background: gradeColor(g) }} /></div>
                    <div style={{ width: 30, fontSize: 12, color: "#555", textAlign: "right" }}>{cnt}</div>
                  </div>
                );
              })}

              <div style={S.filterRow}>
                <SectionTitle>Submissions</SectionTitle>
                <div style={{ display: "flex", gap: 8 }}>
                  <FilterBtn active={filter === "all"} onClick={() => setFilter("all")}>All ({subs.length})</FilterBtn>
                  <FilterBtn active={filter === "flagged"} onClick={() => setFilter("flagged")}>🚨 Flagged ({flagCount})</FilterBtn>
                </div>
              </div>

              <div style={S.tableHead}>
                <div style={{ flex: 2 }}>Name / Roll</div>
                <div style={{ flex: 1, textAlign: "center" }}>Score</div>
                <div style={{ flex: 1, textAlign: "center" }}>Grade</div>
                <div style={{ flex: 1, textAlign: "center" }}>Violations</div>
                <div style={{ flex: 1.5, textAlign: "right" }}>Time</div>
              </div>

              {filtered.length === 0 && (
                <div style={{ textAlign: "center", padding: 20, color: "#888", fontSize: 14 }}>No flagged submissions.</div>
              )}

              {filtered.map((s, idx) => (
                <div key={s.sessionId}>
                  <div style={{
                    ...S.tableRow,
                    background: s.flagged ? "#fff5f5" : idx % 2 === 0 ? "#faf8ff" : "#fff",
                    borderLeft: s.flagged ? "4px solid #e53935" : "4px solid transparent",
                    cursor: "pointer",
                  }} onClick={() => setExpanded(expanded === s.sessionId ? null : s.sessionId)}>
                    <div style={{ flex: 2 }}>
                      <div style={{ fontWeight: 600, fontSize: 14, color: "#2D1B69" }}>{s.name}</div>
                      <div style={{ fontSize: 11, color: "#888" }}>{s.roll} · {s.sessionId}</div>
                      <div style={{ fontSize: 11, color: "#aaa" }}>{s.className} · 📱 {s.mobile}</div>
                    </div>
                    <div style={{ flex: 1, textAlign: "center", fontWeight: 700 }}>{s.score}/{s.total}</div>
                    <div style={{ flex: 1, textAlign: "center", fontWeight: 800, color: gradeColor(s.grade), fontSize: 16 }}>{s.grade}</div>
                    <div style={{ flex: 1, textAlign: "center" }}>
                      <span style={{
                        background: s.warnings >= 3 ? "#fde8e8" : s.warnings > 0 ? "#fff3cd" : "#e8f5e9",
                        color: s.warnings >= 3 ? "#c62828" : s.warnings > 0 ? "#7a4f00" : "#2e7d32",
                        borderRadius: 12, padding: "2px 10px", fontSize: 12, fontWeight: 600,
                      }}>{s.warnings} {s.flagged ? "🚨" : ""}</span>
                    </div>
                    <div style={{ flex: 1.5, textAlign: "right", fontSize: 11, color: "#888" }}>{formatTime(s.timestamp)}</div>
                  </div>
                  {expanded === s.sessionId && (
                    <div style={S.expandBox}>
                      <SectionTitle>Answer Detail — {s.name} ({s.className}) · {s.mobile}</SectionTitle>
                      {s.answers.map((a, i) => {
                        const ok = a.given === a.correct;
                        const skip = a.given === null || a.given === undefined;
                        return (
                          <div key={a.qid} style={{ ...S.revItem, borderLeftColor: skip ? "#bbb" : ok ? "#4a7c59" : "#e53935" }}>
                            <div style={{ fontSize: 11, color: "#888", marginBottom: 2 }}>Q{i + 1} · {a.topic}</div>
                            <div style={S.revQ}>{a.question}</div>
                            <div style={{ fontSize: 12, color: "#999", marginBottom: 3, fontStyle: "italic" }}>{a.hindi}</div>
                            <div style={S.revA}>
                              <span style={{ color: "#4a7c59" }}>Correct: <b>{a.correct ? "TRUE" : "FALSE"}</b></span>
                              &nbsp;·&nbsp;
                              <span style={{ color: skip ? "#999" : ok ? "#4a7c59" : "#e53935" }}>
                                Student: <b>{skip ? "No answer" : a.given ? "TRUE" : "FALSE"}</b>
                              </span>
                            </div>
                          </div>
                        );
                      })}
                    </div>
                  )}
                </div>
              ))}

              <div style={{ marginTop: 20, padding: "12px 14px", background: "#f0edf9", borderRadius: 8, fontSize: 12, color: "#4a2080" }}>
                💡 All records are stored in your Google Sheet. To delete records, edit the Sheet directly (Extensions → Apps Script project → linked Sheet).
              </div>
            </>
          )
        )}

        {activeTab === "schedule" && (
          <div>
            <div style={{
              padding: "12px 16px", borderRadius: 10, marginBottom: 16,
              background: currentStatus === "open" ? "#e8f5e9" : currentStatus === "before" ? "#fff8e1" : "#f5f3fc",
              borderLeft: `4px solid ${currentStatus === "open" ? "#4a7c59" : currentStatus === "before" ? "#f5a623" : "#aaa"}`,
            }}>
              <div style={{ fontWeight: 700, fontSize: 13, color: "#2D1B69", marginBottom: 4 }}>Current Exam Status</div>
              {!win || !win.enabled
                ? <div style={{ color: "#4a7c59", fontSize: 13 }}>✅ No restriction — Test is always open.</div>
                : currentStatus === "open"
                  ? <div style={{ color: "#4a7c59", fontSize: 13 }}>✅ Test is OPEN &nbsp;·&nbsp; Closes: <b>{formatTime(win.endTs)}</b></div>
                  : currentStatus === "before"
                  ? <div style={{ color: "#7a4f00", fontSize: 13 }}>⏳ Test opens: <b>{formatTime(win.startTs)}</b></div>
                  : <div style={{ color: "#888", fontSize: 13 }}>🔒 Test window has ended.</div>
              }
            </div>

            <SectionTitle>Set Exam Window</SectionTitle>

            <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 16, padding: "10px 14px", background: "#f5f3fc", borderRadius: 8 }}>
              <input type="checkbox" id="winToggle" checked={winEnabled} onChange={e => setWinEnabled(e.target.checked)}
                style={{ width: 18, height: 18, accentColor: "#2D1B69", cursor: "pointer" }} />
              <label htmlFor="winToggle" style={{ fontSize: 14, fontWeight: 600, color: "#2D1B69", cursor: "pointer" }}>
                Enable exam window restriction
              </label>
            </div>

            {winEnabled && (
              <>
                <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 }}>
                  <div><Label>Start Date</Label><input type="date" style={S.input} value={startDate} onChange={e => setStartDate(e.target.value)} /></div>
                  <div><Label>Start Time</Label><input type="time" style={S.input} value={startTime} onChange={e => setStartTime(e.target.value)} /></div>
                  <div><Label>End Date</Label><input type="date" style={S.input} value={endDate} onChange={e => setEndDate(e.target.value)} /></div>
                  <div><Label>End Time</Label><input type="time" style={S.input} value={endTime} onChange={e => setEndTime(e.target.value)} /></div>
                </div>
                {startDate && startTime && endDate && endTime && (
                  <div style={{ marginTop: 10, fontSize: 13, color: "#4a2080", background: "#f0edf9", padding: "8px 12px", borderRadius: 6 }}>
                    📅 Window: <b>{new Date(`${startDate}T${startTime}`).toLocaleString("en-IN")}</b>
                    &nbsp;→&nbsp;
                    <b>{new Date(`${endDate}T${endTime}`).toLocaleString("en-IN")}</b>
                  </div>
                )}
              </>
            )}

            {!winEnabled && (
              <div style={{ fontSize: 13, color: "#888", padding: "8px 12px", background: "#f5f3fc", borderRadius: 6 }}>
                When disabled, the test is accessible to students at all times.
              </div>
            )}

            <Btn onClick={handleSaveWindow} disabled={winSaving}>
              {winSaving ? "Saving..." : "💾 Save Exam Window"}
            </Btn>
            {winSaved && <div style={{ ...S.savedBar, marginTop: 10 }}>✅ Exam window saved successfully!</div>}

            <div style={{ marginTop: 20, padding: "12px 14px", background: "#fff8e1", borderRadius: 8, borderLeft: "4px solid #f5a623" }}>
              <div style={{ fontWeight: 700, fontSize: 13, color: "#7a4f00", marginBottom: 6 }}>ℹ️ How it works</div>
              <div style={{ fontSize: 12, color: "#555", lineHeight: 1.7 }}>
                • Set a start date/time and end date/time.<br />
                • Students who open the test before the window will see a "Not Available" screen.<br />
                • Students who open the test after the window will also be blocked.<br />
                • This is saved in the "Config" tab of your Google Sheet — you can also edit it there directly.<br />
                • Uncheck "Enable exam window restriction" to make the test always available.
              </div>
            </div>
          </div>
        )}

        <div style={S.backLink} onClick={onBack}>← Back to Home</div>
      </div>
    </div></div>
  );
}

// ─── SMALL COMPONENTS ─────────────────────────────────────────────
function Label({ children }) {
  return <p style={{ fontSize: 13, fontWeight: 600, color: "#555", marginBottom: 5, marginTop: 14 }}>{children}</p>;
}
function SectionTitle({ children }) {
  return <div style={{ fontSize: 12, fontWeight: 700, color: "#4a2080", textTransform: "uppercase", letterSpacing: 0.8, marginTop: 20, marginBottom: 10, borderBottom: "2px solid #e0d8f0", paddingBottom: 5 }}>{children}</div>;
}
function Btn({ children, onClick, disabled, style = {} }) {
  return (
    <button style={{
      marginTop: 18, width: "100%", padding: "13px",
      background: "linear-gradient(90deg,#F5A623,#e8891a)",
      color: "#2D1B69", fontWeight: 700, fontSize: 15, border: "none",
      borderRadius: 10, cursor: disabled ? "not-allowed" : "pointer",
      opacity: disabled ? 0.45 : 1, ...style,
    }} disabled={disabled} onClick={onClick}>{children}</button>
  );
}
function FilterBtn({ children, active, onClick }) {
  return (
    <button onClick={onClick} style={{
      padding: "4px 12px", borderRadius: 20, border: "1.5px solid #d0c8f0",
      cursor: "pointer", background: active ? "#2D1B69" : "#fff",
      color: active ? "#fff" : "#555", fontSize: 12, fontWeight: 600,
    }}>{children}</button>
  );
}
function TabBtn({ children, active, onClick }) {
  return (
    <button onClick={onClick} style={{
      flex: 1, padding: "10px", border: "none", cursor: "pointer",
      background: active ? "#FAF8F2" : "#f0edf9",
      color: active ? "#2D1B69" : "#888",
      fontWeight: active ? 700 : 500, fontSize: 13,
      borderBottom: active ? "3px solid #F5A623" : "3px solid transparent",
    }}>{children}</button>
  );
}
